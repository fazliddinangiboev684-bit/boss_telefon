<!DOCTYPE html>

<html lang="uz">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Eski Telefon Topshirish - Mini App</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>

        :root {

            --bg-color: #0d1117;

            --container-bg: rgba(22, 27, 34, 0.8);

            --primary-color: #58a6ff;

            --accent-color: #2ea44f;

            --text-color: #c9d1d9;

            --border-color: #30363d;

            --input-bg: #0d1117;

        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {

            background-color: var(--bg-color);

            color: var(--text-color);

            padding: 16px;

            display: flex;

            justify-content: center;

            min-height: 100vh;

        }

        .container {

            background: var(--container-bg);

            border: 1px solid var(--border-color);

            backdrop-filter: blur(10px);

            border-radius: 16px;

            padding: 24px;

            width: 100%;

            max-width: 480px;

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);

            height: fit-content;

        }

        .form-group { margin-bottom: 18px; }

        label {

            display: block;

            margin-bottom: 7px;

            font-size: 12px;

            font-weight: 600;

            color: #8b949e;

            text-transform: uppercase;

            letter-spacing: 0.5px;

        }

        input[type="text"], input[type="tel"] {

            width: 100%;

            background-color: var(--input-bg);

            border: 1px solid var(--border-color);

            color: #fff;

            padding: 12px 14px;

            border-radius: 8px;

            font-size: 15px;

            transition: border-color 0.2s, box-shadow 0.2s;

        }

        input[type="text"]:focus, input[type="tel"]:focus {

            outline: none;

            border-color: var(--primary-color);

            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);

        }

        .pasport-row {

            display: flex;

            gap: 8px;

        }

        .pasport-row .pasport-letters {

            width: 70px;

            flex-shrink: 0;

            text-transform: uppercase;

            letter-spacing: 3px;

            font-size: 15px;

            text-align: center;

        }

        .pasport-row .pasport-numbers {

            flex: 1;

            letter-spacing: 2px;

        }

        .imei-section {

            border: 1px solid var(--border-color);

            border-radius: 10px;

            padding: 14px;

            margin-bottom: 18px;

            background-color: rgba(255, 255, 255, 0.01);

        }

        .btn-ocr-main {

            background-color: var(--primary-color);

            border: none;

            color: #fff;

            padding: 0;

            border-radius: 8px;

            cursor: pointer;

            display: flex;

            align-items: center;

            justify-content: center;

            transition: background-color 0.2s;

        }

        .btn-ocr-main:hover {

            background-color: #1f6feb;

        }

        .btn-ocr-main svg {

            width: 24px;

            height: 24px;

            fill: none;

            stroke: currentColor;

            stroke-width: 2;

        }

        .file-upload {

            border: 2px dashed var(--border-color);

            border-radius: 12px;

            padding: 18px;

            text-align: center;

            cursor: pointer;

            transition: all 0.3s;

            position: relative;

            background-color: rgba(240, 246, 252, 0.02);

        }

        .file-upload:hover { border-color: var(--primary-color); }

        .file-upload p { font-size: 13px; color: #8b949e; margin-top: 8px; }

        .file-upload input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .image-preview {

            margin-top: 10px;

            max-width: 100%;

            border-radius: 8px;

            border: 1px solid var(--border-color);

            display: none;

            cursor: pointer;

        }

        .btn-submit {

            width: 100%;

            background-color: var(--accent-color);

            border: none;

            color: #fff;

            padding: 14px;

            border-radius: 8px;

            font-size: 16px;

            font-weight: 600;

            cursor: pointer;

            margin-top: 8px;

            transition: background-color 0.2s;

        }

        .btn-submit:hover {

            background-color: #2c974b;

        }

        .btn-submit:disabled { background-color: var(--border-color); color: #8b949e; cursor: not-allowed; }

        .overlay {

            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

            background: rgba(13, 17, 23, 0.9);

            display: flex; flex-direction: column; justify-content: center; align-items: center;

            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;

        }

        .overlay.active { opacity: 1; pointer-events: auto; }

        .spinner {

            border: 4px solid rgba(255, 255, 255, 0.1);

            width: 48px; height: 48px; border-radius: 50%;

            border-left-color: var(--primary-color);

            animation: spin 1s linear infinite;

            margin-bottom: 16px;

        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .overlay p { font-size: 15px; font-weight: 500; color: #fff; }

    </style>

</head>

<body>

    <div class="container">

        <div class="form-group">

            <label for="model">Telefon modeli</label>

            <input type="text" id="model" placeholder="Masalan: Samsung Galaxy A51" inputmode="text">

        </div>

        <!-- IMEI Section -->

        <div class="imei-section" style="padding: 14px; margin-bottom: 18px;">

            <div style="display: flex; gap: 8px; align-items: flex-end;">

                <div style="flex: 1; display: flex; flex-direction: column; gap: 12px;">

                    <div style="display: flex; flex-direction: column;">

                        <label style="font-size:11px; margin-bottom:4px">IMEI 1</label>

                        <input type="tel" id="imei" maxlength="15" placeholder="1-IMEI (15 ta raqam)" inputmode="numeric">

                    </div>

                    <div style="display: flex; flex-direction: column;">

                        <label style="font-size:11px; margin-bottom:4px">IMEI 2 (Ixtiyoriy)</label>

                        <input type="tel" id="imei2" maxlength="15" placeholder="2-IMEI (15 ta raqam)" inputmode="numeric">

                    </div>

                </div>

                <button class="btn-ocr-main" id="btnOcr" type="button" title="IMEI-larni rasmdan aniqlash" style="width: 50px; height: 110px; flex-shrink: 0;">

                    <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>

                </button>

            </div>

            <input type="file" id="imeiFileInput" accept="image/*"  style="display:none">

        </div>

        <div class="form-group">

            <label for="egasi">Telefon egasi (F.I.SH.)</label>

            <input type="text" id="egasi" placeholder="Masalan: Sherzod Toshpo'latov" inputmode="text">

        </div>

        <div class="form-group">

            <label>Pasport ma'lumotlari (Majburiy)</label>

            <div class="pasport-row">

                <input type="text" id="pasportHarf" class="pasport-letters" maxlength="2" placeholder="AA" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="characters">

                <input type="tel" id="pasportRaqam" class="pasport-numbers" maxlength="11" placeholder="123 456 789" inputmode="numeric" autocomplete="off">

            </div>

        </div>

        <div class="form-group">

            <label for="manzil">Manzili</label>

            <input type="text" id="manzil" placeholder="Masalan: Toshkent sh., Chilonzor" inputmode="text">

        </div>

        <div class="form-group">

            <label>Rasm</label>

            <div class="file-upload" id="photoUploadContainer">

                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="2">

                    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>

                    <polyline points="21 15 16 10 5 21"/>

                </svg>

                <p id="uploadText">Rasm yuklash yoki suratga olish</p>

                <input type="file" id="phonePhotoInput" accept="image/*" >

            </div>

            <img id="photoPreview" class="image-preview" src="#" alt="Telefon rasmi" title="Rasmni o'zgartirish uchun ikki marta bosing">

        </div>

        <button class="btn-submit" id="btnSubmit">Serverga yuborish</button>

    </div>

    <div class="overlay" id="loadingOverlay">

        <div class="spinner"></div>

        <p id="overlayMessage">Kuting...</p>

    </div>

    <script>

        const tg = window.Telegram.WebApp;

        tg.ready();

        tg.expand();

        const modelInput = document.getElementById('model');

        const imeiInput = document.getElementById('imei');

        const imei2Input = document.getElementById('imei2');

        const egasiInput = document.getElementById('egasi');

        const pasportHarf = document.getElementById('pasportHarf');

        const pasportRaqam = document.getElementById('pasportRaqam');

        const manzilInput = document.getElementById('manzil');

        const btnOcr = document.getElementById('btnOcr');

        const imeiFileInput = document.getElementById('imeiFileInput');

        const phonePhotoInput = document.getElementById('phonePhotoInput');

        const photoPreview = document.getElementById('photoPreview');

        const photoUploadContainer = document.getElementById('photoUploadContainer');

        const btnSubmit = document.getElementById('btnSubmit');

        const loadingOverlay = document.getElementById('loadingOverlay');

        const overlayMessage = document.getElementById('overlayMessage');

        let phonePhotoBase64 = "";

        // Rasm hajmini siqish funksiyasi (Canvas orqali)

        function compressImage(base64Str, maxWidth, maxHeight, quality) {

            return new Promise((resolve) => {

                const img = new Image();

                img.src = base64Str;

                img.onload = () => {

                    const canvas = document.createElement('canvas');

                    let width = img.width;

                    let height = img.height;

                    if (width > height) {

                        if (width > maxWidth) {

                            height = Math.round((height * maxWidth) / width);

                            width = maxWidth;

                        }

                    } else {

                        if (height > maxHeight) {

                            width = Math.round((width * maxHeight) / height);

                            height = maxHeight;

                        }

                    }

                    canvas.width = width;

                    canvas.height = height;

                    const ctx = canvas.getContext('2d');

                    ctx.drawImage(img, 0, 0, width, height);

                    resolve(canvas.toDataURL('image/jpeg', quality));

                };

            });

        }

        // Pasport letters validation

        pasportHarf.addEventListener('input', () => {

            pasportHarf.value = pasportHarf.value.replace(/[^A-Za-z]/g, '').toUpperCase();

            if (pasportHarf.value.length === 2) pasportRaqam.focus();

        });

        // Pasport numbers format

        pasportRaqam.addEventListener('input', () => {

            let digits = pasportRaqam.value.replace(/\D/g, '');

            if (digits.length > 9) digits = digits.slice(0, 9);

            let formatted = '';

            if (digits.length <= 3) {

                formatted = digits;

            } else if (digits.length <= 6) {

                formatted = digits.slice(0, 3) + ' ' + digits.slice(3);

            } else {

                formatted = digits.slice(0, 3) + ' ' + digits.slice(3, 6) + ' ' + digits.slice(6);

            }

            pasportRaqam.value = formatted;

        });

        // Trigger OCR Camera

        btnOcr.addEventListener('click', () => imeiFileInput.click());

        imeiFileInput.addEventListener('change', async (e) => {

            const file = e.target.files[0];

            if (!file) return;

            showOverlay("IMEI kodlari rasmdan aniqlanmoqda...");

            try {

                const result = await Tesseract.recognize(file, 'eng', { logger: () => {} });

                const text = result.data.text;

                const cleaned = text.replace(/[\s-]/g, ' ');

                const rawMatches = cleaned.match(/\b\d{15}\b/g) || [];

                const uniqueMatches = [...new Set(rawMatches)];

                if (uniqueMatches.length > 0) {

                    imeiInput.value = uniqueMatches[0];

                    imei2Input.value = uniqueMatches.length > 1 ? uniqueMatches[1] : "";

                } else {

                    const digits = text.replace(/\D/g, '');

                    const raw2 = digits.match(/\d{15}/g) || [];

                    const unique2 = [...new Set(raw2)];

                    if (unique2.length > 0) {

                        imeiInput.value = unique2[0];

                        imei2Input.value = unique2.length > 1 ? unique2[1] : "";

                    } else {

                        tg.showAlert("IMEI kodlari aniqlanmadi. Iltimos, qo'lda kiriting.");

                    }

                }

            } catch (err) {

                tg.showAlert("Skanerlashda xato yuz berdi: " + err.message);

            } finally {

                hideOverlay();

                imeiFileInput.value = "";

            }

        });

        // Photo Upload

        phonePhotoInput.addEventListener('change', (event) => {

            const file = event.target.files[0];

            if (!file) return;

            const reader = new FileReader();

            reader.onload = async (e) => {

                const rawBase64 = e.target.result;

                showOverlay("Rasm o'lchami siqilmoqda...");

                try {

                    // Rasmni max 1024px o'lchamda va 70% sifat bilan siqamiz

                    phonePhotoBase64 = await compressImage(rawBase64, 1024, 1024, 0.7);

                    photoPreview.src = phonePhotoBase64;

                    photoPreview.style.display = 'block';

                    photoUploadContainer.style.display = 'none';

                } catch (err) {

                    tg.showAlert("Rasmni siqishda xato: " + err.message);

                } finally {

                    hideOverlay();

                }

            };

            reader.readAsDataURL(file);

        });

        // Double-tap/click to change the photo (touch friendly for mobile)

        let lastTap = 0;

        photoPreview.addEventListener('touchend', (e) => {

            const currentTime = new Date().getTime();

            const tapLength = currentTime - lastTap;

            if (tapLength < 300 && tapLength > 0) {

                phonePhotoInput.click();

                e.preventDefault();

            }

            lastTap = currentTime;

        });

        photoPreview.addEventListener('click', (e) => {

            // If it's a desktop browser, click could be used. But let's support double click on desktop

        });

        photoPreview.addEventListener('dblclick', () => {

            phonePhotoInput.click();

        });

        // Submit

        btnSubmit.addEventListener('click', async () => {

            const model = modelInput.value.trim();

            const imei = imeiInput.value.trim();

            const imei2 = imei2Input.value.trim();

            const egasi = egasiInput.value.trim();

            const harf = pasportHarf.value.trim();

            const raqam = pasportRaqam.value.trim();

            const pasport = harf + ' ' + raqam;

            const manzil = manzilInput.value.trim();

            // Calculate and alert size
            if (phonePhotoBase64) {
                const sizeInKb = Math.round((phonePhotoBase64.length * 3) / 4 / 1024);
                tg.showAlert("Yuborilayotgan rasm o'lchami: " + sizeInKb + " KB");
            }
            if (!model) return tg.showAlert("Telefon modelini kiriting!");

            if (!imei) return tg.showAlert("IMEI 1 ni kiriting!");

            if (imei.length !== 15 || isNaN(imei)) return tg.showAlert("1-IMEI kodi roppa-rosa 15 ta raqam bo'lishi shart!");

            if (imei2 && (imei2.length !== 15 || isNaN(imei2))) return tg.showAlert("2-IMEI kodi 15 ta raqam bo'lishi shart!");

            if (!egasi) return tg.showAlert("Telefon egasining ismini kiriting!");

            if (harf.length !== 2) return tg.showAlert("Pasport seriyasini kiriting (masalan: AA)!");

            if (raqam.replace(/\s/g,'').length < 7) return tg.showAlert("Pasport raqamini to'liq kiriting (masalan: 123 456 789)!");

            if (!manzil) return tg.showAlert("Manzilni kiriting!");

            showOverlay("Ma'lumotlar 1C ga yuborilmoqda...");

            const payload = { model, imei, imei2, egasi, pasport, manzil, photo: phonePhotoBase64 };

            const urlParams = new URLSearchParams(window.location.search);

            let apiUrl = urlParams.get('api_url');

            if (!apiUrl) {

                if (window.location.hostname.includes("github.io")) {

                    hideOverlay();

                    return tg.showAlert("Xato: 'api_url' parametri topilmadi!");

                }

                const p = window.location.pathname;

                apiUrl = p.substring(0, p.lastIndexOf('/'));

            }

            try {

                const response = await fetch(apiUrl + "/hs/mobileapi/save_phone", {

                    method: 'POST',

                    headers: { 'Content-Type': 'application/json' },

                    body: JSON.stringify(payload)

                });

                if (response.ok) {

                    const result = await response.json();

                    tg.showAlert("Hujjat yaratildi! Raqami: " + result.number);

                    setTimeout(() => tg.close(), 1500);

                } else {

                    tg.showAlert("1C xato: " + await response.text());

                }

            } catch (error) {

                tg.showAlert("Tarmoq xatosi: " + error.message);

            } finally {

                hideOverlay();

            }

        });

        function showOverlay(msg) {

            overlayMessage.textContent = msg;

            loadingOverlay.classList.add('active');

            btnSubmit.disabled = true;

        }

        function hideOverlay() {

            loadingOverlay.classList.remove('active');

            btnSubmit.disabled = false;

        }

    </script>

</body>

</html>
