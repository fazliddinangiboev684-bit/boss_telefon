<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eski Telefon Topshirish - Mini App</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Tesseract.js OCR Engine -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: rgba(22, 27, 34, 0.8);
            --primary-color: #58a6ff;
            --accent-color: #2ea44f;
            --text-color: #c9d1d9;
            --border-color: #30363d;
            --input-bg: #0d1117;
            --danger-color: #f85149;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 24px;
            color: #ffffff;
            font-size: 22px;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .imei-wrapper {
            display: flex;
            gap: 8px;
        }

        .btn-ocr {
            background-color: var(--primary-color);
            border: none;
            color: #ffffff;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            flex-shrink: 0;
            width: 48px;
        }

        .btn-ocr:hover {
            background-color: #1f6feb;
        }

        .btn-ocr svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .file-upload {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            background-color: rgba(240, 246, 252, 0.02);
        }

        .file-upload:hover {
            border-color: var(--primary-color);
            background-color: rgba(88, 166, 255, 0.05);
        }

        .file-upload p {
            font-size: 14px;
            color: #8b949e;
            margin-top: 8px;
        }

        .file-upload input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .image-preview {
            margin-top: 12px;
            max-width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent-color);
            border: none;
            color: #ffffff;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #2c974b;
        }

        .btn-submit:disabled {
            background-color: var(--border-color);
            color: #8b949e;
            cursor: not-allowed;
        }

        /* Loading / Scanning Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: var(--primary-color);
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .overlay p {
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Eski telefon topshirish</h2>
        
        <div class="form-group">
            <label for="model">Telefon modeli</label>
            <input type="text" id="model" placeholder="Masalan: Samsung Galaxy A51">
        </div>

        <div class="form-group">
            <label for="imei">IMEI 1 (15 ta raqam)</label>
            <div class="imei-wrapper">
                <input type="text" id="imei" maxlength="15" placeholder="1-IMEI kod (15 ta raqam)">
                <button class="btn-ocr" id="btnOcr" title="1-IMEI rasmini skanerlash (OCR)">
                    <svg viewBox="0 0 24 24" stroke="currentColor">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                </button>
            </div>
            <input type="file" id="imeiFileInput" accept="image/*" style="display: none;">
        </div>

        <div class="form-group">
            <label for="imei2">IMEI 2 (Ixtiyoriy)</label>
            <div class="imei-wrapper">
                <input type="text" id="imei2" maxlength="15" placeholder="2-IMEI kod (15 ta raqam)">
                <button class="btn-ocr" id="btnOcr2" title="2-IMEI rasmini skanerlash (OCR)">
                    <svg viewBox="0 0 24 24" stroke="currentColor">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                </button>
            </div>
            <input type="file" id="imeiFileInput2" accept="image/*" style="display: none;">
        </div>

        <div class="form-group">
            <label for="egasi">Telefon egasi (F.I.SH.)</label>
            <input type="text" id="egasi" placeholder="Masalan: Sherzod Toshpo'latov">
        </div>

        <div class="form-group">
            <label for="manzil">Manzili</label>
            <input type="text" id="manzil" placeholder="Masalan: Toshkent sh., Chilonzor">
        </div>

        <div class="form-group">
            <label>Rasm</label>
            <div class="file-upload" id="photoUploadContainer">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <p id="uploadText">Rasm yuklash yoki suratga olish</p>
                <input type="file" id="phonePhotoInput" accept="image/*">
            </div>
            <img id="photoPreview" class="image-preview" src="#" alt="Telefon rasmi">
        </div>

        <button class="btn-submit" id="btnSubmit">Hujjatni 1C ga yuborish</button>
    </div>

    <!-- Spinner Loading Overlay -->
    <div class="overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p id="overlayMessage">Kuting, ma'lumotlar qayta ishlanmoqda...</p>
    </div>

    <script>
        // Telegram WebApp initializations
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // DOM elements
        const modelInput = document.getElementById('model');
        const imeiInput = document.getElementById('imei');
        const imei2Input = document.getElementById('imei2');
        const egasiInput = document.getElementById('egasi');
        const manzilInput = document.getElementById('manzil');
        
        const btnOcr = document.getElementById('btnOcr');
        const imeiFileInput = document.getElementById('imeiFileInput');
        
        const btnOcr2 = document.getElementById('btnOcr2');
        const imeiFileInput2 = document.getElementById('imeiFileInput2');
        
        const phonePhotoInput = document.getElementById('phonePhotoInput');
        const photoPreview = document.getElementById('photoPreview');
        const uploadText = document.getElementById('uploadText');
        const btnSubmit = document.getElementById('btnSubmit');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const overlayMessage = document.getElementById('overlayMessage');

        let phonePhotoBase64 = "";

        // Trigger hidden inputs for OCR
        btnOcr.addEventListener('click', () => imeiFileInput.click());
        btnOcr2.addEventListener('click', () => imeiFileInput2.click());

        // Helper function to process OCR
        async function runOcrOnFile(file, targetInput) {
            showOverlay("IMEI kod rasmdan aniqlanmoqda...");
            try {
                const result = await Tesseract.recognize(
                    file,
                    'eng',
                    { logger: m => console.log(m) }
                );
                
                const text = result.data.text;
                console.log("OCR Result Text:", text);

                // Find 15 digits sequence
                const imeiMatch = text.replace(/[\s-]/g, '').match(/\b\d{15}\b/);
                
                if (imeiMatch && imeiMatch[0]) {
                    targetInput.value = imeiMatch[0];
                    tg.showAlert("IMEI kod muvaffaqiyatli aniqlandi: " + imeiMatch[0]);
                } else {
                    const digits = text.replace(/\D/g, '');
                    const fallbackMatch = digits.match(/\d{15}/);
                    if (fallbackMatch && fallbackMatch[0]) {
                        targetInput.value = fallbackMatch[0];
                        tg.showAlert("IMEI kod topildi: " + fallbackMatch[0]);
                    } else {
                        tg.showAlert("IMEI код расмдан аниқланмади. Илтимос, қўлда киритинг.");
                    }
                }
            } catch (error) {
                console.error("OCR Error:", error);
                tg.showAlert("Skanerlashda xato yuz berdi: " + error.message);
            } finally {
                hideOverlay();
            }
        }

        // Connect OCR file inputs
        imeiFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) runOcrOnFile(file, imeiInput);
            imeiFileInput.value = "";
        });

        imeiFileInput2.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) runOcrOnFile(file, imei2Input);
            imeiFileInput2.value = "";
        });

        // Photo upload preview
        phonePhotoInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                phonePhotoBase64 = e.target.result;
                photoPreview.src = phonePhotoBase64;
                photoPreview.style.display = 'block';
                uploadText.textContent = "Boshqa rasm tanlash";
            };
            reader.readAsDataURL(file);
        });

        // Submit to 1C
        btnSubmit.addEventListener('click', async () => {
            const model = modelInput.value.trim();
            const imei = imeiInput.value.trim();
            const imei2 = imei2Input.value.trim();
            const egasi = egasiInput.value.trim();
            const manzil = manzilInput.value.trim();

            if (!model || !imei || !egasi || !manzil) {
                tg.showAlert("Iltimos, barcha majburiy maydonlarni (Model, IMEI 1, Egasi, Manzil) to'ldiring!");
                return;
            }

            if (imei.length !== 15 || isNaN(imei)) {
                tg.showAlert("1-IMEI kodi roppa-rosa 15 ta raqam bo'lishi shart!");
                return;
            }

            if (imei2 && (imei2.length !== 15 || isNaN(imei2))) {
                tg.showAlert("2-IMEI kodi kiritilgan бўлса, роппа-роса 15 та рақам бўлиши шарт!");
                return;
            }

            showOverlay("Ma'lumotlar 1C ga yuborilmoqda...");

            const payload = {
                model: model,
                imei: imei,
                imei2: imei2,
                egasi: egasi,
                manzil: manzil,
                photo: phonePhotoBase64
            };

            const urlParams = new URLSearchParams(window.location.search);
            let apiUrl = urlParams.get('api_url');
            if (!apiUrl) {
                if (window.location.hostname.includes("github.io")) {
                    tg.showAlert("Xato: 'api_url' parametri topilmadi!");
                    hideOverlay();
                    return;
                }
                const currentPath = window.location.pathname;
                apiUrl = currentPath.substring(0, currentPath.lastIndexOf('/'));
            }
            
            const url = apiUrl + "/hs/mobileapi/save_phone";

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const result = await response.json();
                    tg.showAlert("Hujjat 1C da muvaffaqiyatli yaratildi!\nHujjat raqami: " + result.number);
                    setTimeout(() => {
                        tg.close();
                    }, 1500);
                } else {
                    const errorText = await response.text();
                    tg.showAlert("1C ga yuborishda xato: " + errorText);
                }
            } catch (error) {
                console.error("Fetch error:", error);
                tg.showAlert("Tarmoq ulanish xatosi (IIS yoki Ngrok/Tailscale ishlayotganini tekshiring): " + error.message);
            } finally {
                hideOverlay();
            }
        });

        function showOverlay(message) {
            overlayMessage.textContent = message;
            loadingOverlay.classList.add('active');
            btnSubmit.disabled = true;
        }

        function hideOverlay() {
            loadingOverlay.classList.remove('active');
            btnSubmit.disabled = false;
        }
    </script>
</body>
</html>
